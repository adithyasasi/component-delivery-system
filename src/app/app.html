<div class="demo">
  <h1>Component Delivery System</h1>
  <p class="subtitle">Enter a UUID returned from the registry server to load and render a remote component.</p>

  <div class="uuid-row">
    <label for="uuid">Component UUID</label>
    <input
      id="uuid"
      [(ngModel)]="uuid"
      placeholder="e.g. abc-123-xyz-456"
    />
  </div>

  @if (uuid) {
    <div class="loader-section">
      <h2>Remote Component</h2>
      <app-remote-loader
        [uuid]="uuid"
        [inputs]="{ entity: entity }"
        (componentEvent)="onComponentEvent($event)">
      </app-remote-loader>
    </div>
  }

  @if (lastEvent) {
    <div class="event-log">
      <strong>Last received event:</strong>
      <pre>{{ lastEvent | json }}</pre>
    </div>
  }

  <button (click)="changeParentID()">Change Parent ID</button>
</div>
